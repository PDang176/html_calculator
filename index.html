<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Calculator</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="calculator">
    <div id="display">
      <div id="prev"></div>
      <div id="current"></div>
    </div>
    <div id="buttons">
      <button class="act-btn plusMinus">&#177;</button>
      <button class="act-btn answer">Ans</button>
      <button class="act-btn clear">C</button>
      <button class="act-btn clearAll">AC</button>
      <button class="num-btn symbol">7</button>
      <button class="num-btn symbol">8</button>
      <button class="num-btn symbol">9</button>
      <button class="act-btn symbol">/</button>
      <button class="num-btn symbol">4</button>
      <button class="num-btn symbol">5</button>
      <button class="num-btn symbol">6</button>
      <button class="act-btn symbol">x</button>
      <button class="num-btn symbol">1</button>
      <button class="num-btn symbol">2</button>
      <button class="num-btn symbol">3</button>
      <button class="act-btn symbol">-</button>
      <button class="num-btn symbol">.</button>
      <button class="num-btn symbol">0</button>
      <button class="eq-btn" disabled>=</button>
      <button class="act-btn symbol">+</button>
    </div>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
